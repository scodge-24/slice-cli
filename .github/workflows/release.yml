name: Release

# Builds prebuilt `slice` binaries for each platform and attaches them to a
# GitHub Release when a version tag is pushed (e.g. `git tag v0.1.0 && git push --tags`).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          # Intel macOS, cross-compiled on the arm64 runner: GitHub has retired
          # the macos-13 Intel runners, so building the x86_64 target there hung forever.
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/slice-rs
      - name: Build
        run: cargo build --release --locked --manifest-path rust/slice-rs/Cargo.toml --target ${{ matrix.target }}

      - name: Install cargo-about
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-about
      - name: Generate third-party licenses
        run: cargo about generate -c rust/slice-rs/about.toml --manifest-path rust/slice-rs/Cargo.toml rust/slice-rs/about.hbs -o THIRD-PARTY-LICENSES.html

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bin="rust/slice-rs/target/${{ matrix.target }}/release/slice"
          mkdir -p dist
          cp "$bin" THIRD-PARTY-LICENSES.html LICENSE dist/
          tar -czf "slice-${{ matrix.target }}.tar.gz" -C dist slice THIRD-PARTY-LICENSES.html LICENSE
      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          bin="rust/slice-rs/target/${{ matrix.target }}/release/slice.exe"
          mkdir -p dist
          cp "$bin" THIRD-PARTY-LICENSES.html LICENSE dist/
          7z a "slice-${{ matrix.target }}.zip" ./dist/*

      - name: Attach to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            slice-${{ matrix.target }}.tar.gz
            slice-${{ matrix.target }}.zip
          fail_on_unmatched_files: false
