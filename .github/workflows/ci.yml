name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Primary gate: the shipped `slice` binary.
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/slice-rs
      # Python is the parity test oracle (parity.rs shells out to `python -m slice_cli`).
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure git (tests build temp repos)
        run: |
          git config --global user.email ci@example.com
          git config --global user.name CI
      - run: pip install -e ".[dev]"
      - run: cargo fmt --check --manifest-path rust/slice-rs/Cargo.toml
      - run: cargo clippy --manifest-path rust/slice-rs/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path rust/slice-rs/Cargo.toml
      - run: cargo build --release --manifest-path rust/slice-rs/Cargo.toml
      - run: rust/slice-rs/target/release/slice --repo examples/mock-repo list --json

  # Oracle correctness: the Python implementation backs the Rust parity tests
  # until Rust's snapshot coverage is self-sufficient (then this job is removed).
  python-oracle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure git (tests build temp repos)
        run: |
          git config --global user.email ci@example.com
          git config --global user.name CI
      - run: pip install -e ".[dev]"
      - run: pytest
      - run: pyright slice_cli test_slices_cli.py
