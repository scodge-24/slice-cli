# cargo-about config: which licenses we accept in the dependency tree.
# Used to generate THIRD-PARTY-LICENSES.html bundled into release archives.
# If a dep ever introduces a license not listed here, `cargo about generate`
# fails — surfacing it before we ship a binary that redistributes it.
accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0",
    "BSL-1.0",
]
