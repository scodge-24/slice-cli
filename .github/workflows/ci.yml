name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/slice-rs
      - name: Configure git (tests build temp repos)
        run: |
          git config --global user.email ci@example.com
          git config --global user.name CI
      - name: Install ripgrep (slice grep shells out to rg)
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - run: cargo fmt --check --manifest-path rust/slice-rs/Cargo.toml
      - run: cargo clippy --manifest-path rust/slice-rs/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path rust/slice-rs/Cargo.toml
      - run: cargo build --release --manifest-path rust/slice-rs/Cargo.toml
      - run: rust/slice-rs/target/release/slice --repo examples/mock-repo list --json
